@if (service.current(); as ach) {
  <div class="ach-overlay" (click)="service.dismiss()">
    <div class="ach-modal" (click)="$event.stopPropagation()" role="dialog" aria-modal="true">
      <div class="ach-glow"></div>
      <div class="ach-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
          <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
          <path d="M4 22h16"/>
          <path d="M10 14.66V17c0 .55-.45 1-1 1H4v2h16v-2h-5c-.55 0-1-.45-1-1v-2.34"/>
          <path d="M12 2a5 5 0 0 0-5 5v2h10V7a5 5 0 0 0-5-5z"/>
        </svg>
      </div>
      <h2 class="ach-title">Conquista Desbloqueada!</h2>
      <div class="ach-name">{{ ach.title }}</div>
      <p class="ach-desc">{{ ach.description }}</p>
      @if (ach.xpReward) {
        <div class="ach-xp">+{{ ach.xpReward }} XP</div>
      }
      <button class="ach-btn" (click)="service.dismiss()">Continuar</button>
    </div>
  </div>
}
