<div class="overlay" role="dialog" aria-modal="true" (click)="onCancel()">
  <div class="confirm-dialog" (click)="$event.stopPropagation()">
    @if (title()) {
      <h3>{{ title() }}</h3>
    }
    <p>{{ message() }}</p>
    <div class="confirm-actions">
      <button class="btn" [class.btn-danger]="confirmStyle() === 'danger'" [class.btn-primary]="confirmStyle() === 'primary'" (click)="onConfirm()" [disabled]="saving()">
        {{ saving() ? processingText() : confirmText() }}
      </button>
      <button class="btn" (click)="onCancel()">{{ cancelText() }}</button>
    </div>
  </div>
</div>
