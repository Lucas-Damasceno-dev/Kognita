<div class="page-header">
  <h1>Subjects</h1>
  <button class="btn" (click)="showForm = !showForm">
    {{ showForm ? 'Cancel' : '+ Subject' }}
  </button>
</div>

@if (showForm) {
  <form (ngSubmit)="create()" class="form-card">
    <label>
      Name
      <input type="text" [(ngModel)]="name" name="name" required />
    </label>
    <label>
      Description
      <input type="text" [(ngModel)]="description" name="description" />
    </label>
    <label>
      Color
      <input type="color" [(ngModel)]="color" name="color" />
    </label>
    <button type="submit" class="btn btn-primary" [disabled]="saving">{{ saving ? 'Saving...' : 'Save' }}</button>
  </form>
}

@if (loading()) {
  <app-loading />
} @else {
  <div class="list">
    @for (item of subjects; track item.id) {
      <div class="list-item">
        <span class="color-dot" [style.background]="item.color"></span>
        <div>
          <strong>{{ item.name }}</strong>
          @if (item.description) {
            <p>{{ item.description }}</p>
          }
        </div>
        <button class="btn-icon" (click)="remove(item.id)">✕</button>
      </div>
    } @empty {
      <p class="empty">No subjects yet.</p>
    }
  </div>
}
