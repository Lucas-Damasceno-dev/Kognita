<div class="page-header">
  <h1>Subjects</h1>
  <button class="btn" (click)="editingId = null; showForm = !showForm; showForm ? null : resetForm()">
    {{ showForm ? 'Cancel' : '+ Subject' }}
  </button>
</div>

@if (showForm) {
  <form (ngSubmit)="save()" class="form-card">
    <label>
      Name
      <input type="text" [(ngModel)]="name" name="name" required />
    </label>
    <label>
      Description
      <input type="text" [(ngModel)]="description" name="description" />
    </label>
    <label>
      Color
      <input type="color" [(ngModel)]="color" name="color" />
    </label>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="saving">{{ saving ? 'Saving...' : editingId ? 'Update' : 'Save' }}</button>
      @if (editingId) {
        <button type="button" class="btn" (click)="cancel()">Cancel</button>
      }
    </div>
  </form>
}

@if (loading()) {
  <app-loading />
} @else {
  <div class="list">
    @for (item of subjects; track item.id) {
      <div class="list-item">
        <span class="color-dot" [style.background]="item.color"></span>
        <div>
          <strong>{{ item.name }}</strong>
          @if (item.description) {
            <p>{{ item.description }}</p>
          }
        </div>
        <div class="list-actions">
          <button class="btn btn-sm" (click)="edit(item)">Edit</button>
          <button class="btn-icon" (click)="remove(item.id)">✕</button>
        </div>
      </div>
    } @empty {
      <p class="empty">No subjects yet.</p>
    }
  </div>
}
