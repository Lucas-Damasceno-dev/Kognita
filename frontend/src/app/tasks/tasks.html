<div class="page-header">
  <h1>Tasks</h1>
  <button class="btn" (click)="showForm = !showForm">
    {{ showForm ? 'Cancel' : '+ Task' }}
  </button>
</div>

@if (showForm) {
  <form (ngSubmit)="create()" class="form-card">
    <label>
      Title
      <input type="text" [(ngModel)]="title" name="title" required />
    </label>
    <label>
      Priority
      <select [(ngModel)]="priority" name="priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </label>
    <label>
      Subject
      <select [(ngModel)]="subjectId" name="subjectId">
        <option value="">None</option>
        @for (s of subjects; track s.id) {
          <option [value]="s.id">{{ s.name }}</option>
        }
      </select>
    </label>
    <button type="submit" class="btn btn-primary" [disabled]="saving">{{ saving ? 'Saving...' : 'Save' }}</button>
  </form>
}

@if (loading()) {
  <app-loading />
} @else {
  <div class="list">
    @for (item of tasks; track item.id) {
      <div class="list-item" [class.done]="item.status === 'completed'">
        <input type="checkbox" [checked]="item.status === 'completed'" (change)="toggleStatus(item)" />
        <div>
          <strong>{{ item.title }}</strong>
          @if (item.subjectName) {
            <span class="subject-tag">{{ item.subjectName }}</span>
          }
        </div>
        <span class="priority-badge {{ item.priority }}">{{ item.priority }}</span>
        <button class="btn-icon" (click)="remove(item.id)">✕</button>
      </div>
    } @empty {
      <p class="empty">No tasks yet.</p>
    }
  </div>
}
