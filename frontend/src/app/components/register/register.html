<div class="auth-container">
  <form (ngSubmit)="submit()" class="auth-card">
    <h1>Create account</h1>
    <p class="subtitle">Start organizing your studies</p>

    <label>
      Name
      <input type="text" [(ngModel)]="name" name="name" required autocomplete="name" />
    </label>

    <label>
      Email
      <input type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
    </label>

    <label>
      Password
      <input type="password" [(ngModel)]="password" name="password" required minlength="6" />
    </label>

    <label>
      Confirm password
      <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required />
    </label>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Create account' }}
    </button>

    <p class="footnote">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </form>
</div>
