<div class="auth-container">
  <form (ngSubmit)="submit()" class="auth-card">
    <h1>Entrar</h1>
    <p class="subtitle">Bem-vindo de volta ao Kognita</p>

    <label>
      Email
      <input type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
    </label>

    <label>
      Senha
      <input type="password" [(ngModel)]="password" name="password" required />
    </label>
    <button type="submit" [disabled]="loading()">

      {{ loading() ? 'Entrando...' : 'Entrar' }}
    </button>

    <p class="footnote">
      Não tem conta? <a routerLink="/register">Criar uma</a>
    </p>
  </form>
</div>
