spring:
  application:
    name: KognitaBackend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/kognita}
    username: ${SPRING_DATASOURCE_USERNAME:kognita}
    password: ${SPRING_DATASOURCE_PASSWORD:kognita123}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    baseline-on-migrate: true
    locations: classpath:db/migration

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:a_very_long_fallback_secret_for_dev_only_please_change_in_prod_123456789}
  expiration: ${JWT_EXPIRATION:86400000}

ai:
  api:
    url: ${AI_API_URL:https://api.openai.com/v1}
    key: ${AI_API_KEY:your-key-here}
