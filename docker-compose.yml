services:
  postgres:
    image: postgres:16-alpine
    container_name: kognita-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kognita}
      POSTGRES_USER: ${POSTGRES_USER:-kognita}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kognita123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: kognita-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kognita}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-kognita}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-kognita123}
      JWT_SECRET: ${JWT_SECRET:-a_very_long_fallback_secret_for_dev_only_please_change_in_prod_123456789}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: kognita-web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
