services:
  postgres:
    image: postgres:16-alpine
    container_name: kognita-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kognita}
      POSTGRES_USER: ${POSTGRES_USER:-kognita}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kognita123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kognita} -d ${POSTGRES_DB:-kognita}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: kognita-api
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kognita}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-kognita}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-kognita123}
      JWT_SECRET: ${JWT_SECRET:-dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBrb2duaXRhIGFwcGxpY2F0aW9uIHVzZSBhIGJldHRlciBvbmUgaW4gcHJvZHVjdGlvbg}
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: kognita-web
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
